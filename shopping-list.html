<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 32px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 .icon { font-size: 1.8rem; }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #5a67d8; }

    .stats {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 16px;
    }

    .stats span { font-weight: 600; color: #667eea; }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      transition: opacity 0.2s;
    }

    li.checked {
      opacity: 0.5;
      background: #edf2f7;
    }

    li.checked .item-name {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
      font-size: 13px;
      color: #fff;
    }

    .checkbox.on {
      background: #48bb78;
      border-color: #48bb78;
    }

    .item-name {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-all;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #cbd5e0;
      font-size: 1.1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0;
      font-size: 0.95rem;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      border-color: #fc8181;
      color: #fc8181;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1><span class="icon">🛒</span> 쇼핑 리스트</h1>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템을 입력하세요..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty" style="display:none">아직 아이템이 없습니다.<br/>위에서 추가해 보세요!</div>

    <button class="clear-btn" onclick="clearChecked()">완료된 항목 삭제</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://sjfeifjziazjlgohmfop.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNqZmVpZmp6aWF6amxnb2htZm9wIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDg3MzksImV4cCI6MjA5MjQyNDczOX0.yRFCt7Ep5s0U2gsbWlBynqzYcMApOkqav-3Aj_yHsgI';
    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    const input = document.getElementById('itemInput');
    const listEl = document.getElementById('list');
    const statsEl = document.getElementById('stats');
    const emptyEl = document.getElementById('empty');

    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (!error) {
        items = data;
        render();
      }
    }

    function render() {
      listEl.innerHTML = '';

      const total = items.length;
      const done = items.filter(i => i.checked).length;

      if (total === 0) {
        emptyEl.style.display = 'block';
        statsEl.textContent = '';
      } else {
        emptyEl.style.display = 'none';
        statsEl.innerHTML = `총 <span>${total}</span>개 &nbsp;·&nbsp; 완료 <span>${done}</span>개`;
      }

      items.forEach(item => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('div');
        cb.className = 'checkbox' + (item.checked ? ' on' : '');
        cb.textContent = item.checked ? '✓' : '';
        cb.onclick = () => toggle(item.id, item.checked);

        const name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '✕';
        del.title = '삭제';
        del.onclick = () => remove(item.id);

        li.appendChild(cb);
        li.appendChild(name);
        li.appendChild(del);
        listEl.appendChild(li);
      });
    }

    async function addItem() {
      const val = input.value.trim();
      if (!val) return;
      input.value = '';
      const { data, error } = await db
        .from('shopping_items')
        .insert({ name: val, checked: false })
        .select()
        .single();
      if (!error) {
        items.push(data);
        render();
      }
      input.focus();
    }

    async function toggle(id, currentChecked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !currentChecked })
        .eq('id', id);
      if (!error) {
        const item = items.find(i => i.id === id);
        if (item) item.checked = !currentChecked;
        render();
      }
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;
      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);
      if (!error) {
        items = items.filter(i => !i.checked);
        render();
      }
    }

    loadItems();
  </script>
</body>
</html>
